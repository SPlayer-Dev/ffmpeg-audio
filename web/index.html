<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>FFmpeg Audio demo</title>
		<style>
		body {
			font-family: system-ui;
			padding: 2rem;
			max-width: 600px;
			margin: auto;
		}
		.track-info {
			display: none;
			gap: 1rem;
			align-items: flex-start;
			margin-top: 1.5rem;
			margin-bottom: 1.5rem;
		}
		.track-info.visible {
			display: flex;
		}
		.cover-art {
			width: 120px;
			height: 120px;
			flex-shrink: 0;
			background: #e0e0e0;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}
		.cover-art img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		.cover-art .placeholder {
			font-size: 2.5rem;
			color: #999;
		}
		.metadata {
			flex: 1;
			min-width: 0;
			font-size: 0.85rem;
			line-height: 1.5;
			word-break: break-all;
		}
		.metadata .meta-item {
			display: flex;
			gap: 0.5rem;
		}
		.metadata .meta-key {
			color: #666;
			flex-shrink: 0;
		}
		.metadata .meta-value {
			color: #222;
		}
		.controls {
			margin-top: 1rem;
			display: flex;
			gap: 1rem;
			align-items: center;
		}
		button {
			padding: 0.5rem 1rem;
			cursor: pointer;
		}
		input[type="range"] {
			flex: 1;
		}
		</style>
	</head>
	<body>
		<h1>FFmpeg Audio demo</h1>
		<button id="open-btn">Select Audio File</button>

		<div id="track-info" class="track-info">
			<div id="cover-art" class="cover-art">
				<span class="placeholder">&#9835;</span>
			</div>
			<div id="metadata" class="metadata"></div>
		</div>

		<div class="controls">
			<button id="play-btn" disabled>Play</button>
			<button id="pause-btn" disabled>Pause</button>
		</div>

		<div class="controls">
			<span id="time-current">00:00</span>
			<input
				type="range"
				id="seek-bar"
				min="0"
				max="100"
				value="0"
				step="0.1"
				disabled
			>
			<span id="time-total">00:00</span>
		</div>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>

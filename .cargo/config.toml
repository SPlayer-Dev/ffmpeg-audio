[target.wasm32-unknown-emscripten]
rustflags = [
    "-C",
    "link-arg=--js-library=crates/ffmpeg_wasm/library_ffmpeg.js",

    "-C",
    "link-arg=-sALLOW_MEMORY_GROWTH=1",

    "-C",
    "link-arg=-sEXPORTED_FUNCTIONS=['_main','_malloc','_free','_wasm_decoder_create','_wasm_decoder_destroy','_wasm_decoder_decode_frame','_wasm_decoder_get_frame_samples','_wasm_decoder_get_channel_ptr','_wasm_decoder_seek','_wasm_decoder_get_duration','_wasm_decoder_get_metadata_json','_wasm_decoder_get_cover_ptr','_wasm_decoder_get_cover_size','_wasm_decoder_get_cover_mime']",

    "-C",
    "link-arg=-sEXPORTED_RUNTIME_METHODS=['getValue','setValue','wasmMemory','HEAPF32', 'UTF8ToString']",
    "-C",
    "link-arg=-sEXPORT_ES6=1",
    "-C",
    "link-arg=-sMODULARIZE=1",
    "-C",
    "link-arg=-sNO_EXIT_RUNTIME=1",
    "-C",
    "link-arg=-sDISABLE_EXCEPTION_CATCHING=1",

    "-C",
    "link-arg=--profiling",
]

runner = "node"
